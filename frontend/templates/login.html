<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - NexusForum</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">💬</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your forum account</p>

      <form>
        <div class="form-group">
          <label for="email">Email or Username</label>
          <input type="text" id="email" placeholder="Enter your email or username">
        </div>

        <div class="form-group password-group">
          <div class="label-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <input type="password" id="password" placeholder="Enter your password">
        </div>

        <button type="submit" class="submit-btn">Sign In</button>
      </form>

      <p class="footer-text">Don't have an account? <a href="register.html">Create an account</a></p>
      <p class="footer-text"><a href="index.html">Back to home</a></p>
    </div>
  </div>
</body>
</html>
